<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infoscreen</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe id="infoscreenFrame"></iframe>

  <script>
    const params = new URLSearchParams(window.location.search);
    const room = params.get("room") || "ls1";

    const appUrl =
      "https://script.google.com/macros/s/AKfycbw3G2Nb5Wn5vnz0qM7O8BKhbKeFaGF0yuf_-iZCgjl4D8ai9cUw6DVdeWmBlylYWgVn/exec?room=" +
      encodeURIComponent(room);

    document.getElementById("infoscreenFrame").src = appUrl;
  </script>
</body>
</html>
